name: Build and Push

on:
    push:
        branches: [main, master]
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: Login no GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Build e Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: |
                      ghcr.io/quintilis-server/quintilis-frontend:latest
                      ghcr.io/quintilis-server/quintilis-frontend:${{ github.sha }}